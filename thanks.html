<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mensaje enviado · David Milán</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:#F5F0E8;--ink:#1A1714;--accent:#C8440A;--accent-l:#F2784B;--warm:#8B7355}
    body{font-family:"DM Sans",sans-serif;background:var(--ink);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;cursor:none}
    .cursor{width:10px;height:10px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
    .cursor-ring{width:36px;height:36px;border:1.5px solid var(--cream);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%)}
    .icon{font-size:3rem;margin-bottom:32px}
    h1{font-family:"Instrument Serif",serif;font-size:clamp(3rem,8vw,7rem);line-height:0.95;letter-spacing:-0.04em;margin-bottom:24px}
    h1 em{font-style:italic;color:var(--accent-l)}
    p{font-size:1rem;color:rgba(245,240,232,0.5);font-weight:300;line-height:1.75;max-width:420px;margin-bottom:48px}
    a{display:inline-flex;align-items:center;gap:8px;background:var(--cream);color:var(--ink);padding:14px 28px;border-radius:100px;text-decoration:none;font-size:0.88rem;font-weight:500;transition:background .2s,transform .2s}
    a:hover{background:var(--accent-l);transform:translateY(-2px)}
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="icon">✉️</div>
  <h1>Mensaje<br><em>recibido</em></h1>
  <p>Gracias por escribirme. Te respondo en menos de 24h.</p>
  <a href="index.html">← Volver al portfolio</a>

  <script>
    const cursor=document.getElementById("cursor"),ring=document.getElementById("cursorRing");
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+"px";cursor.style.top=my+"px";});
    (function animRing(){rx+=(mx-rx)*.14;ry+=(my-ry)*.14;ring.style.left=rx+"px";ring.style.top=ry+"px";requestAnimationFrame(animRing)})();
  </script>
</body>
</html>
